version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quiz_postgres
    environment:
      POSTGRES_USER: quizuser
      POSTGRES_PASSWORD: quizpass
      POSTGRES_DB: quizdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: quiz_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz_network

  # Backend Instance 1
  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz_backend1
    env_file:
      - ./configs/environments/.env.production
    environment:
      - DATABASE_URL=postgresql://quizuser:quizpass@postgres:5432/quizdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - quiz_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Backend Instance 2
  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz_backend2
    env_file:
      - ./configs/environments/.env.production
    environment:
      - DATABASE_URL=postgresql://quizuser:quizpass@postgres:5432/quizdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - quiz_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Backend Instance 3
  backend3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz_backend3
    env_file:
      - ./configs/environments/.env.production
    environment:
      - DATABASE_URL=postgresql://quizuser:quizpass@postgres:5432/quizdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - quiz_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Nginx Load Balancer
  nginx:
    image: nginx:1.27-alpine
    container_name: quiz_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      - backend1
      - backend2
      - backend3
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - quiz_network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: quiz_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - quiz_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  quiz_network:
    driver: bridge
