global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'quiz-platform'
    static_configs:
      - targets: ['backend1:8000', 'backend2:8000', 'backend3:8000']
        labels:
          service: 'backend'
      
      - targets: ['nginx:8080']
        labels:
          service: 'loadbalancer'
    
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
