version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: test_quizdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  quiz-api:
    build: ../backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/test_quizdb
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis
    ports:
      - "8001:8000"

volumes:
  test_postgres_data:
