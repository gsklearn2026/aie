# Redis Configuration for Quiz Platform Caching

# Memory and persistence
maxmemory 256mb
maxmemory-policy allkeys-lru
save 900 1
save 300 10
save 60 10000

# Network
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 300

# Logging
loglevel notice
logfile ""

# Performance
tcp-backlog 511
databases 16
