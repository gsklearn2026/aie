version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: quiz_platform
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  postgres_backup:
    image: postgres:16
    environment:
      POSTGRES_DB: quiz_backup
      POSTGRES_USER: backup_user
      POSTGRES_PASSWORD: backup_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_backup_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backup_service:
    build: .
    command: python -m src.backup_service.main
    depends_on:
      - postgres
      - postgres_backup
      - redis
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://quiz_user:quiz_password@postgres:5432/quiz_platform
      - BACKUP_DATABASE_URL=postgresql://backup_user:backup_password@postgres_backup:5432/quiz_backup
      - REDIS_URL=redis://redis:6379/0

  recovery_service:
    build: .
    command: python -m src.recovery_service.main
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - postgres_backup
      - redis
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - recovery_service

volumes:
  postgres_data:
  postgres_backup_data:
  redis_data:
