<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Analysis Service</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>Topic Analysis Service</h1>
            <p>AI-powered topic extraction and categorization</p>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Analyze Content</h2>
            <form id="analysisForm">
                <div class="form-group">
                    <label for="content">Content to Analyze:</label>
                    <textarea id="content" rows="8" placeholder="Enter your content here for topic analysis..."></textarea>
                </div>
                
                <div class="options-grid">
                    <div class="form-group">
                        <label for="maxTopics">Max Topics:</label>
                        <input type="number" id="maxTopics" value="10" min="1" max="50">
                    </div>
                    
                    <div class="form-group">
                        <label for="confidence">Confidence Threshold:</label>
                        <input type="range" id="confidence" value="0.5" min="0" max="1" step="0.1">
                        <span id="confidenceValue">0.5</span>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="includeSubtopics" checked>
                        <label for="includeSubtopics">Include Subtopics</label>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="extractConcepts" checked>
                        <label for="extractConcepts">Extract Concepts</label>
                    </div>
                </div>
                
                <button type="submit" class="analyze-btn">
                    <span id="buttonText">Analyze Topics</span>
                    <div id="loadingSpinner" class="spinner"></div>
                </button>
            </form>
        </div>

        <div id="resultsCard" class="card" style="display: none;">
            <h2>Analysis Results</h2>
            <div id="analysisResults"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
