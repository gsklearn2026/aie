version: '3.8'

services:
  topic-analysis:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ./templates:/app/templates
    networks:
      - topic-analysis-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - topic-analysis-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - topic-analysis-network

volumes:
  redis_data:

networks:
  topic-analysis-network:
    driver: bridge
