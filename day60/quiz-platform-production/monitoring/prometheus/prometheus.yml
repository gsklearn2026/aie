global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'quiz-platform-blue'
    static_configs:
      - targets: ['backend-blue:8000']
  
  - job_name: 'quiz-platform-green'
    static_configs:
      - targets: ['backend-green:8000']
  
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
