<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Abstraction Layer - Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Abstraction Layer</h1>
            <p>Vendor-agnostic AI integration with automatic failover</p>
            <span id="systemStatus" class="status-badge status-healthy">System Online</span>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Generate Text</h2>
                <form id="generateForm">
                    <div class="form-group">
                        <label for="prompt">Prompt</label>
                        <textarea id="prompt" placeholder="Enter your prompt here..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="maxTokens">Max Tokens</label>
                        <input type="number" id="maxTokens" value="1000" min="1" max="4000">
                    </div>
                    
                    <div class="form-group">
                        <label for="temperature">Temperature</label>
                        <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
                    </div>
                    
                    <button type="submit" class="btn" id="generateBtn">Generate Text</button>
                    <button type="button" class="btn" id="healthCheckBtn">Check Health</button>
                </form>
                
                <div class="loading" id="loading">
                    Generating response...
                </div>
            </div>

            <div class="card">
                <h2>Provider Status</h2>
                <div id="providerStatus" class="provider-status">
                    <div class="provider-card">
                        <div class="provider-name">Loading...</div>
                        <div class="provider-details">Checking provider status...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card response-area">
            <h2>Response</h2>
            <div id="response" class="response-content">
                Click "Generate Text" to see AI responses here...
            </div>
            <div id="metadata" class="metadata" style="display: none;"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
