version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
      - "3000:3000"
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=docker
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
      - elasticsearch

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  elasticsearch_data:
