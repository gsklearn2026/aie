version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-your-anthropic-api-key}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ../backend:/app
    networks:
      - quiz-platform

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - quiz-platform

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quiz-platform

networks:
  quiz-platform:
    driver: bridge
