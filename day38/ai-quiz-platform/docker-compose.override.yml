version: '3.8'

services:
  backend:
    volumes:
      - ./backend:/app
    environment:
      - FLASK_DEBUG=1
      - FLASK_ENV=development
    command: python -m flask run --host=0.0.0.0 --port=8000 --debug

  frontend:
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      - FAST_REFRESH=true
      - CHOKIDAR_USEPOLLING=true
    command: npm start
