version: '3.8'

services:
  backend:
    environment:
      - FLASK_ENV=production
      - DEBUG=false
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 app:app

  frontend:
    environment:
      - NODE_ENV=production
    command: serve -s build -l 3000

  nginx:
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
