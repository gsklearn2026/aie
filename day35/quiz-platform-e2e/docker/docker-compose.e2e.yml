version: '3.8'

services:
  frontend-e2e:
    build: 
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend-e2e:8000
    depends_on:
      - backend-e2e
    networks:
      - e2e-network

  backend-e2e:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://test:test@postgres-e2e:5432/quiz_test
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis-e2e:6379
    depends_on:
      - postgres-e2e
      - redis-e2e
    networks:
      - e2e-network

  postgres-e2e:
    image: postgres:16
    environment:
      POSTGRES_DB: quiz_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    networks:
      - e2e-network

  redis-e2e:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - e2e-network

  e2e-tests:
    build:
      context: ../tests
      dockerfile: ../docker/Dockerfile.e2e
    volumes:
      - ../tests:/app/tests
      - ../reports:/app/reports
    environment:
      - FRONTEND_URL=http://frontend-e2e:3000
      - BACKEND_URL=http://backend-e2e:8000
      - TEST_DB_URL=postgresql://test:test@postgres-e2e:5432/quiz_test
    depends_on:
      - frontend-e2e
      - backend-e2e
    networks:
      - e2e-network

volumes:
  postgres_e2e_data:

networks:
  e2e-network:
    driver: bridge
